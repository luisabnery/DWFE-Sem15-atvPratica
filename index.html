<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Ecommerce</title>
  <link rel="stylesheet" href="styles.css">
  <script src="./assets/js/login.js"></script>
</head>
<body>

  <header class="site-header">
    <h1>🛒 Mini Ecommerce</h1>
    <div id="login-area" class="login-area">
      <!-- Preenchido dinamicamente pelo login.js -->
      <a href="/modulos/login/index.html" class="login-link">Entrar</a>
    </div>
  </header>

  <nav class="nav-links">
    <a href="index.html">🏠 Início</a>
    <a href="favoritos.html">❤️ Meus Favoritos</a>
  </nav>

  <div class="controls">
    <input type="text" id="search" placeholder="Buscar produto...">
    <select id="category">
      <option value="Todas">Todas</option>
    </select>
    <button id="btnRender">Renderizar</button>
  </div>

  <div id="product-list"></div>

  <!-- Toast de aviso para usuário não logado -->
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="app.js"></script>

</body>
</html>
